<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>復古零食店</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header>
        <div class="menu">☰
            <div class="dropdown">
                <div onclick="filterCategory('all')">全部商品</div>
                <div onclick="filterCategory('candy')">糖果</div>
                <div onclick="filterCategory('cookie')">餅乾</div>
                <div onclick="filterCategory('drink')">飲料</div>
            </div>
        </div>

        <img src="images/logo.jpg" class="logo">

        <input id="searchInput" class="search" placeholder="搜尋零食..." onkeyup="searchProduct()">

        <button onclick="openLogin()" id="loginBtn">登入</button>
        <button onclick="openRegister()" id="regBtn">註冊</button>

        <div id="userArea"></div>

        <div class="cartIcon" id="cartBtn" onclick="openCart()" style="display: none;">
            <img src="images/cart.png" alt="" style="width: 50px; height: 50px; border-radius: 50%; cursor: pointer; vertical-align: middle;">
        </div>
    </header>

    <div class="banner">
        <img id="slide" src="images/banner1.jpg">
    </div>

    <div class="products">
        <div class="card candy" data-name="大豬公糖"> <img src="images/5涵.jpg">
            <h3>大豬公糖</h3>
            <p>$20</p>
            <!-- <input type="number" id="qty1" value="1" min="1"> -->
            <!-- 這邊的 圖片記得改成 images/snack1.jpg -->
            <button onclick="showProduct('大豬公糖','80年代經典糖果','images/5涵.jpg',20)">
                商品介紹
            </button>
            <!-- <button onclick="addToCart('大豬公糖',20,'qty1')">
                加入購物車
            </button> -->
        </div>

        <div class="card cookie" data-name="飛壘口香糖">
            <img src="images/國華出國.jpg">
            <h3>飛壘口香糖</h3>
            <p>$15</p>
            <!-- <input type="number" id="qty2" value="1" min="1"> -->
            <!-- 這邊的 圖片記得改成 images/snack2.jpg -->
            <button onclick="showProduct('飛壘口香糖','童年回憶','images/國華出國.jpg',15)">
                商品介紹
            </button>
            <!-- <button onclick="addToCart('飛壘口香糖',15,'qty2')">
                加入購物車
            </button> -->
        </div>

        <div class="card drink" data-name="彈珠汽水">
            <img src="images/宣傳.jpg">
            <h3>彈珠汽水</h3>
            <p>$30</p>
            <!-- <input type="number" id="qty3" value="1" min="1"> -->
            <!-- 這邊的 圖片記得改成 images/snack3.jpg -->
            <button onclick="showProduct('彈珠汽水','復古飲料','images/宣傳.jpg',30)">
                商品介紹
            </button>
            <!-- <button onclick="addToCart('彈珠汽水',30,'qty3')">
                加入購物車
            </button> -->
        </div>

        <div class="card candy" data-name="酸梅糖">
            <img src="images/王室敏.jpg">
            <h3>酸梅糖</h3>
            <p>$10</p>
            <!-- <input type="number" id="qty4" value="1" min="1"> -->
            <!-- 這邊的 圖片記得改成 images/snack4.jpg -->
            <button onclick="showProduct('酸梅糖','懷舊酸甜滋味','images/王室敏.jpg',10)">
                商品介紹
            </button>
            <!-- <button onclick="addToCart('酸梅糖',10,'qty4')">
                加入購物車
            </button> -->
        </div>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content" style="width: 700px; max-width: 90%; padding: 30px; border-radius: 10px;">
            <span onclick="closePopup()" style="float: right; cursor: pointer; font-size: 24px; margin-top: -10px;">✕</span>

            <h2 style="text-align: center; border-bottom: 2px solid #5a3d2b; padding-bottom: 10px; margin-top: 0;">商品介面</h2>

            <div style="display: flex; gap: 40px; margin-top: 20px;">
                <div style="flex: 1; text-align: center;">
                    <img id="pimg" style="width: 100%; max-width: 250px;  border: 1px solid #ccc; border-radius: 8px;">
                    <!-- <p style="margin-top: 10px; color: #666; font-size: 14px;">● 〇 〇<br>商品展示</p> -->
                </div>

                <div style="flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <h3 id="pname" style="font-size: 24px; margin-bottom: 10px;"></h3>
                        <p id="ptext" style="color: #666; margin-bottom: 10px; line-height: 1.5;"></p>
                        <p id="pprice" style="font-size: 22px; font-weight: bold; color: #d9534f; border-bottom: 1px solid #ddd; padding-bottom: 15px;"></p>
                    </div>

                    <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0;">
                        <button onclick="changeQty(-1)" style="padding: 5px 15px; font-size: 20px; cursor: pointer;">-</button>
                        <input type="number" id="popupQty" value="1" min="1" style="width: 60px; text-align: center; font-size: 18px; padding: 5px;">
                        <button onclick="changeQty(1)" style="padding: 5px 15px; font-size: 20px; cursor: pointer;">+</button>
                    </div>

                    <div>
                        <button id="popupAddBtn" style="width: 100%; padding: 12px; font-size: 18px; background-color: #5a3d2b; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px;">加入購物車</button>
                        <button style="width: 100%; padding: 10px; font-size: 16px; background-color: #eee; color: #333; border: 1px solid #ccc; border-radius: 5px; cursor: pointer;">商品留言</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-box">
            <h2>購物車</h2>
            <div id="cartItems"></div> <h3 id="cartTotal"></h3>
            <button onclick="checkout()">結帳</button>
            <span class="close" onclick="closeCart()">✕</span>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-box">
            <h2>會員登入</h2>
            <input id="loginUser" type="text" placeholder="帳號">
            <input id="loginPass" type="password" placeholder="密碼">
            <button onclick="login()">登入</button>
            <p onclick="switchRegister()">沒有帳號？註冊</p> <span class="close" onclick="closeModal()">✕</span>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-box">
            <h2>會員註冊</h2>
            <div id="regInitial"> <input id="regUser" type="text" placeholder="帳號">
                <input id="regEmail" type="email" placeholder="Email">
                <input id="regPass" type="password" placeholder="密碼">
                <button onclick="register()">發送驗證碼</button>
            </div>
            
            <div id="regVerify" style="display: none;"> <p>驗證碼已寄到您的信箱</p>
                <input id="verifyCode" type="text" placeholder="請輸入 6 位驗證碼">
                <button onclick="verifyCode()">確認驗證</button>
            </div>
            <p onclick="switchLogin()">已有帳號？登入</p>
            <span class="close" onclick="closeModal()">✕</span>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
