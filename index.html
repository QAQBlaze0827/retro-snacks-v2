<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾憶</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header>
        <div class="menu" onclick="toggleDropdown(event)">☰
            <div class="dropdown" id="myDropdown">
                <div onclick="filterCategory('all')">全部商品</div>
                <div onclick="filterCategory('candy')">糖果</div>
                <div onclick="filterCategory('cookie')">餅乾</div>
                <div onclick="filterCategory('drink')">飲料</div>
            </div>
        </div>

        <img src="images/logo.jpg" class="logo">

        <input id="searchInput" class="search" placeholder="搜尋零食..." onkeyup="searchProduct()">

        <button onclick="openLogin()" id="loginBtn">登入</button>
        <button onclick="openRegister()" id="regBtn">註冊</button>

        <div id="userArea"></div>

        <button class="favoriteIcon" id="cartBtn" onclick="openFavorites()" style="display: none;" title="我的收藏">
            <img class="favoriteImage" src="images/favorite-transparent.png" alt="我的收藏">
            <span class="favoriteCount" id="favoriteCount">0</span>
        </button>
    </header>

    <div class="banner">
        <img id="slide" src="images/banner1.jpg">
    </div>

    <div class="products-section">
        <!-- 商品卡片將在這裡動態生成 -->
         <div class="products" id="productContainer">
            <p style="color: white; text-align: center; width: 100%;">商品載入中，請稍候...</p>
        </div>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content product-popup-content" style="width: 700px; max-width: 90%; padding: 30px; border-radius: 10px;">
            <span onclick="closePopup()" style="float: right; cursor: pointer; font-size: 24px; margin-top: -10px;">✕</span>

            <h2 style="text-align: center; border-bottom: 2px solid #5a3d2b; padding-bottom: 10px; margin-top: 0;">商品介面</h2>

            <div class="product-popup-layout" style="display: flex; gap: 40px; margin-top: 20px;">
                <div class="product-popup-image-wrap" style="flex: 1; text-align: center;">
                    <img id="pimg" class="product-popup-image" style="width: 100%; max-width: 250px;  border: 1px solid #ccc; border-radius: 8px;">
                    <!-- <p style="margin-top: 10px; color: #666; font-size: 14px;">● 〇 〇<br>商品展示</p> -->
                </div>

                <div class="product-popup-info" style="flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <h3 id="pname" style="font-size: 24px; margin-bottom: 10px;"></h3>
                        <p id="ptext" style="color: #666; margin-bottom: 10px; line-height: 1.5;"></p>
                        <p id="pprice" style="font-size: 22px; font-weight: bold; color: #d9534f; border-bottom: 1px solid #ddd; padding-bottom: 15px;"></p>
                    </div>
                    <div id="optionSection" style="display: none; margin: 15px 0; text-align: left;">
                        <label style="font-weight: bold; color: #5a3d2b; display: block; margin-bottom: 5px;">選擇口味：</label>
                        <select id="productOption" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px;">
                            </select>
                    </div>
                    <div class="popup-qty-control" style="display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0;">
                        <button onclick="changeQty(-1)" style="padding: 5px 15px; font-size: 20px; cursor: pointer;">-</button>
                        <input type="number" id="popupQty" value="1" min="1" style="width: 60px; text-align: center; font-size: 18px; padding: 5px;">
                        <button onclick="changeQty(1)" style="padding: 5px 15px; font-size: 20px; cursor: pointer;">+</button>
                    </div>

                    <div>
                        <button id="popupAddBtn" style="width: 100%; padding: 12px; font-size: 18px; background-color: #5a3d2b; 
                                color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px;">
                                加入收藏
                        </button>
                        <!-- <button style="width: 100%; padding: 10px; font-size: 16px; background-color: #eee; color: #333; border: 1px solid #ccc; border-radius: 5px; cursor: pointer;">商品留言</button> -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="favoriteModal" class="modal">
        <div class="modal-box">
            <h2>我的收藏</h2>
            <div id="favoriteItems"></div>
            <h3 id="favoriteSummary"></h3>
            <span class="close" onclick="closeFavorites()">✕</span>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-box">
            <h2>會員登入</h2>
            <input id="loginUser" type="text" placeholder="帳號">
            <input id="loginPass" type="password" placeholder="密碼">
            <button onclick="login()">登入</button>
            <p onclick="switchRegister()">沒有帳號？註冊</p> <span class="close" onclick="closeModal()">✕</span>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-box">
            <h2>會員註冊</h2>
            <div id="regInitial"> <input id="regUser" type="text" placeholder="帳號">
                <input id="regEmail" type="email" placeholder="Email">
                <input id="regPass" type="password" placeholder="密碼">
                <button onclick="register()">發送驗證碼</button>
            </div>
            
            <div id="regVerify" style="display: none;"> <p>驗證碼已寄到您的信箱</p>
                <input id="verifyCode" type="text" placeholder="請輸入 6 位驗證碼">
                <button onclick="verifyCode()">確認驗證</button>
            </div>
            <p onclick="switchLogin()">已有帳號？登入</p>
            <span class="close" onclick="closeModal()">✕</span>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>

</body>
</html>
